services:
  postgres:
    image: postgres:16-alpine
    container_name: api-task-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api-task
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    container_name: api-task
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - 3000:3000
    command: ["./command.sh"]
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data:
